<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1320" role="img"
     aria-labelledby="pipeline-title pipeline-desc"
     font-family="'Nunito Sans', 'Helvetica Neue', sans-serif">
  <title id="pipeline-title">The thaiphon pipeline</title>
  <desc id="pipeline-desc">Thai text flows top to bottom through six stages — normalisation, lexicon lookup, syllabification, rule-based derivation, the phonological word data contract, and the renderer — and emerges as a surface string in IPA, TLC, RTGS, Morev, RTL, Paiboon, Paiboon+, or LMT.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#322a70"/>
      <stop offset="1" stop-color="#221c5a"/>
    </linearGradient>
    <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#c49a3c" stop-opacity="0"/>
      <stop offset=".5"  stop-color="#c49a3c" stop-opacity=".9"/>
      <stop offset="1"   stop-color="#c49a3c" stop-opacity="0"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c49a3c"/>
    </marker>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope=".22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx=".5" cy=".5" r=".35" fill="#2a2640" fill-opacity=".025"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="720" height="1320" fill="url(#paper)"/>
  <rect width="720" height="1320" fill="url(#grain)"/>

  <!-- Eyebrow title -->
  <g transform="translate(360, 42)" text-anchor="middle">
    <text xml:space="preserve" font-size="10" letter-spacing="3" fill="#8a6a1e" font-weight="700">T H E   P I P E L I N E</text>
    <line x1="-22" y1="11" x2="22" y2="11" stroke="#c49a3c" stroke-width="1.5"/>
  </g>

  <!-- INPUT chip -->
  <g transform="translate(260, 70)">
    <rect width="200" height="76" rx="10" fill="#2d2768" filter="url(#softShadow)"/>
    <text xml:space="preserve" x="100" y="26" text-anchor="middle" font-size="9" letter-spacing="2" word-spacing="6" fill="#d4af5a" font-weight="700">INPUT · THAI TEXT</text>
    <line x1="84" y1="34" x2="116" y2="34" stroke="#c49a3c" stroke-width="1" opacity=".5"/>
    <text x="100" y="60" text-anchor="middle" font-size="28" fill="#fffdf8" font-family="'Sarabun','Prompt',sans-serif" font-weight="600">ภาษาไทย</text>
  </g>
  <line x1="360" y1="146" x2="360" y2="172" stroke="#c49a3c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STAGE 01 — Normalise -->
  <g transform="translate(0, 178)">
    <text x="60" y="60" text-anchor="middle" font-family="'Prompt','Playfair Display',serif" font-size="56" font-weight="300" fill="#c49a3c" opacity=".55">01</text>
    <g transform="translate(120, 0)">
      <rect width="560" height="92" rx="10" fill="url(#card)" filter="url(#softShadow)"/>
      <text x="24" y="32" font-size="9" letter-spacing="2.5" fill="#d4af5a" font-weight="700">NORMALISE &amp; EXPAND</text>
      <text x="24" y="56" font-size="17" fill="#fffdf8" font-weight="600">Unicode cleanup and spelling expansion</text>
      <text x="24" y="76" font-size="11" fill="#c9c5e0">NFC · mark reorder · Sara Am → /aː/+/m/ · ๆ · digits</text>
    </g>
  </g>
  <line x1="360" y1="270" x2="360" y2="296" stroke="#c49a3c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STAGE 02 — Lexicon -->
  <g transform="translate(0, 302)">
    <text x="60" y="60" text-anchor="middle" font-family="'Prompt','Playfair Display',serif" font-size="56" font-weight="300" fill="#c49a3c" opacity=".55">02</text>
    <g transform="translate(120, 0)">
      <rect width="560" height="92" rx="10" fill="url(#card)" filter="url(#softShadow)"/>
      <text x="24" y="32" font-size="9" letter-spacing="2.5" fill="#d4af5a" font-weight="700">LEXICON LOOKUPS</text>
      <text x="24" y="56" font-size="17" fill="#fffdf8" font-weight="600">Exact-match shortcut through curated readings</text>
      <text x="24" y="76" font-size="11" fill="#c9c5e0">irregulars · respelling · VOLUBILIS lexicon (optional)</text>
    </g>
  </g>
  <line x1="360" y1="394" x2="360" y2="420" stroke="#c49a3c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STAGE 03 — Syllabify -->
  <g transform="translate(0, 426)">
    <text x="60" y="60" text-anchor="middle" font-family="'Prompt','Playfair Display',serif" font-size="56" font-weight="300" fill="#c49a3c" opacity=".55">03</text>
    <g transform="translate(120, 0)">
      <rect width="560" height="92" rx="10" fill="url(#card)" filter="url(#softShadow)"/>
      <text x="24" y="32" font-size="9" letter-spacing="2.5" fill="#d4af5a" font-weight="700">SYLLABIFY</text>
      <text x="24" y="56" font-size="17" fill="#fffdf8" font-weight="600">Segment the word into syllable candidates</text>
      <text x="24" y="76" font-size="11" fill="#c9c5e0">TCC tokeniser → candidate generator → ranker</text>
    </g>
  </g>
  <line x1="360" y1="518" x2="360" y2="544" stroke="#c49a3c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STAGE 04 — Derive -->
  <g transform="translate(0, 550)">
    <text x="60" y="60" text-anchor="middle" font-family="'Prompt','Playfair Display',serif" font-size="56" font-weight="300" fill="#c49a3c" opacity=".55">04</text>
    <g transform="translate(120, 0)">
      <rect width="560" height="92" rx="10" fill="url(#card)" filter="url(#softShadow)"/>
      <text x="24" y="32" font-size="9" letter-spacing="2.5" fill="#d4af5a" font-weight="700">RULE-BASED DERIVATION</text>
      <text x="24" y="56" font-size="17" fill="#fffdf8" font-weight="600">Resolve each segment into phonemes</text>
      <text x="24" y="76" font-size="11" fill="#c9c5e0">onset → vowel → coda → syllable type → tone</text>
    </g>
  </g>
  <line x1="360" y1="642" x2="360" y2="668" stroke="#c49a3c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STAGE 05 — PhonologicalWord -->
  <g transform="translate(0, 674)">
    <text x="60" y="60" text-anchor="middle" font-family="'Prompt','Playfair Display',serif" font-size="56" font-weight="300" fill="#c49a3c" opacity=".55">05</text>
    <g transform="translate(120, 0)">
      <rect width="560" height="92" rx="10" fill="url(#card)" filter="url(#softShadow)"/>
      <text x="24" y="32" font-size="9" letter-spacing="2.5" fill="#d4af5a" font-weight="700">PHONOLOGICAL WORD</text>
      <text x="24" y="56" font-size="17" fill="#fffdf8" font-weight="600">Frozen, scheme-independent data structure</text>
      <text x="24" y="76" font-size="11" fill="#c9c5e0">tuple of Syllable objects · hashable · the stable contract</text>
    </g>
  </g>
  <line x1="360" y1="766" x2="360" y2="792" stroke="#c49a3c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STAGE 06 — Renderer (gold accent) -->
  <g transform="translate(0, 798)">
    <text x="60" y="60" text-anchor="middle" font-family="'Prompt','Playfair Display',serif" font-size="56" font-weight="400" fill="#c49a3c" opacity=".7">06</text>
    <g transform="translate(120, 0)">
      <rect width="560" height="92" rx="10" fill="#c49a3c" filter="url(#softShadow)"/>
      <text x="24" y="32" font-size="9" letter-spacing="2.5" fill="#2d2768" font-weight="700">RENDERER</text>
      <text x="24" y="56" font-size="17" fill="#fffdf8" font-weight="600">Apply a SchemeMapping to emit surface text</text>
      <text x="24" y="76" font-size="11" fill="#fffdf8" opacity=".88">onset map · vowel map · coda map · tone format</text>
    </g>
  </g>

  <!-- Fan-out connectors — eight arrows from the renderer's bottom
       centre (360, 890), four to each of the two output rows. Every
       arrow clearly originates from the renderer, not from another
       chip. The row-2 curves pass behind the row-1 chip rectangles,
       which occlude their middle segments (SVG draw order: paths
       render first, rects render on top). -->
  <path d="M 360 890 C 360 918, 180 932, 96 968"   fill="none" stroke="#c49a3c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 360 890 C 360 914, 310 930, 272 968"  fill="none" stroke="#c49a3c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 360 890 C 360 914, 410 930, 448 968"  fill="none" stroke="#c49a3c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 360 890 C 360 918, 540 932, 624 968"  fill="none" stroke="#c49a3c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 360 890 C 280 960, 140 1060, 96 1108"  fill="none" stroke="#c49a3c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 360 890 C 340 960, 290 1060, 272 1108" fill="none" stroke="#c49a3c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 360 890 C 380 960, 430 1060, 448 1108" fill="none" stroke="#c49a3c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M 360 890 C 440 960, 580 1060, 624 1108" fill="none" stroke="#c49a3c" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Output eyebrow — paper-colour stroke halo so the centre arrows
       read cleanly through the text. -->
  <g transform="translate(360, 956)" text-anchor="middle">
    <text xml:space="preserve" font-size="9" letter-spacing="3" paint-order="stroke" stroke="#faf7f0" stroke-width="4" stroke-linejoin="round" fill="#5a4510" font-weight="700">S U R F A C E   S T R I N G</text>
  </g>

  <!-- Row 1: IPA · TLC · RTGS · MOREV -->

  <!-- IPA output -->
  <g transform="translate(16, 980)">
    <rect width="160" height="74" rx="9" fill="#fffdf8" stroke="#e8e4dd" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8a6a1e" font-weight="700">IPA</text>
    <line x1="66" y1="28" x2="94" y2="28" stroke="#c49a3c" stroke-width=".75" opacity=".4"/>
    <text x="80" y="56" text-anchor="middle" font-family="'Fira Mono','Menlo',monospace" font-size="13" fill="#2d2768">pʰaː.sǎː.tʰaj</text>
  </g>

  <!-- TLC output (tones as superscript, matching thai-language.com) -->
  <g transform="translate(192, 980)">
    <rect width="160" height="74" rx="9" fill="#fffdf8" stroke="#e8e4dd" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8a6a1e" font-weight="700">TLC</text>
    <line x1="66" y1="28" x2="94" y2="28" stroke="#c49a3c" stroke-width=".75" opacity=".4"/>
    <text x="80" y="56" text-anchor="middle" font-family="'Fira Mono','Menlo',monospace" font-size="13" fill="#2d2768" xml:space="preserve"><tspan>paa saa</tspan><tspan dy="-5" font-size="9">R</tspan><tspan dy="5" font-size="13"> tai</tspan><tspan dy="-5" font-size="9">M</tspan></text>
  </g>

  <!-- RTGS output (Royal Thai General System, toneless plain ASCII) -->
  <g transform="translate(368, 980)">
    <rect width="160" height="74" rx="9" fill="#fffdf8" stroke="#e8e4dd" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8a6a1e" font-weight="700">RTGS</text>
    <line x1="66" y1="28" x2="94" y2="28" stroke="#c49a3c" stroke-width=".75" opacity=".4"/>
    <text x="80" y="56" text-anchor="middle" font-family="'Fira Mono','Menlo',monospace" font-size="13" fill="#2d2768">phasa thai</text>
  </g>

  <!-- Morev output (uses tspan superscript for aspirated stops) -->
  <g transform="translate(544, 980)">
    <rect width="160" height="74" rx="9" fill="#fffdf8" stroke="#e8e4dd" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8a6a1e" font-weight="700">MOREV</text>
    <line x1="66" y1="28" x2="94" y2="28" stroke="#c49a3c" stroke-width=".75" opacity=".4"/>
    <text x="80" y="56" text-anchor="middle" font-family="'Fira Mono','Menlo',monospace" font-size="13" fill="#2d2768" xml:space="preserve"><tspan>п</tspan><tspan dy="-5" font-size="9">х</tspan><tspan dy="5" font-size="13">а̄-са̄´-т</tspan><tspan dy="-5" font-size="9">х</tspan><tspan dy="5" font-size="13">ай</tspan></text>
  </g>

  <!-- Row 2: RTL · PAIBOON · PAIBOON+ · LMT -->

  <!-- RTL output (Rak Thai Language School) — macron on mid-tone vowels,
       háček on rising syllable, space as syllable separator. -->
  <g transform="translate(16, 1120)">
    <rect width="160" height="74" rx="9" fill="#fffdf8" stroke="#e8e4dd" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8a6a1e" font-weight="700">RTL</text>
    <line x1="66" y1="28" x2="94" y2="28" stroke="#c49a3c" stroke-width=".75" opacity=".4"/>
    <text x="80" y="56" text-anchor="middle" font-family="'Fira Mono','Menlo',monospace" font-size="13" fill="#2d2768">phāa sǎa thāy</text>
  </g>

  <!-- Paiboon output — mid tone unmarked, háček on the rising syllable. -->
  <g transform="translate(192, 1120)">
    <rect width="160" height="74" rx="9" fill="#fffdf8" stroke="#e8e4dd" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8a6a1e" font-weight="700">PAIBOON</text>
    <line x1="66" y1="28" x2="94" y2="28" stroke="#c49a3c" stroke-width=".75" opacity=".4"/>
    <text x="80" y="56" text-anchor="middle" font-family="'Fira Mono','Menlo',monospace" font-size="13" fill="#2d2768">paa-sǎa-tai</text>
  </g>

  <!-- Paiboon+ output — same surface for this example (centring
       diphthong doubling is what distinguishes the two schemes). -->
  <g transform="translate(368, 1120)">
    <rect width="160" height="74" rx="9" fill="#fffdf8" stroke="#e8e4dd" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8a6a1e" font-weight="700">PAIBOON+</text>
    <line x1="66" y1="28" x2="94" y2="28" stroke="#c49a3c" stroke-width=".75" opacity=".4"/>
    <text x="80" y="56" text-anchor="middle" font-family="'Fira Mono','Menlo',monospace" font-size="13" fill="#2d2768">paa-sǎa-tai</text>
  </g>

  <!-- LMT output — Lipilina-Muzychenko-Thapanosoth learner textbook
       Cyrillic, Unicode superscript-digit tones, colon for length. -->
  <g transform="translate(544, 1120)">
    <rect width="160" height="74" rx="9" fill="#fffdf8" stroke="#e8e4dd" stroke-width="1"/>
    <text x="80" y="22" text-anchor="middle" font-size="9" letter-spacing="2" fill="#8a6a1e" font-weight="700">LMT</text>
    <line x1="66" y1="28" x2="94" y2="28" stroke="#c49a3c" stroke-width=".75" opacity=".4"/>
    <text x="80" y="56" text-anchor="middle" font-family="'Fira Mono','Menlo',monospace" font-size="13" fill="#2d2768">пха:⁰ са:⁴ тхай⁰</text>
  </g>

  <!-- Footer ornament -->
  <g transform="translate(360, 1250)" text-anchor="middle">
    <line x1="-60" y1="0" x2="-10" y2="0" stroke="url(#goldRule)" stroke-width="1"/>
    <circle cx="0" cy="0" r="2" fill="#c49a3c"/>
    <line x1="10" y1="0" x2="60" y2="0" stroke="url(#goldRule)" stroke-width="1"/>
  </g>
  <text x="360" y="1280" text-anchor="middle" font-size="11" fill="#9994ab" font-style="italic">One phonological word, many surface notations.</text>
</svg>
